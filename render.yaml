services:
  - type: web
    name: cemantish-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: "https://cemantix-de-wish.vercel.app,https://cemantish.vercel.app"
      # N'oublie pas d'ajouter ta clé secrète GEMINI_API_KEY dans l'interface Render !
